<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SHARKIRY — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#120C06;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Sarabun',sans-serif;}
.login-box{background:#1C1008;border:1px solid rgba(201,164,84,.2);border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#C9A454;letter-spacing:6px;text-align:center;margin-bottom:6px;}
.sub{text-align:center;font-size:11px;color:rgba(201,164,84,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;}
.deco{text-align:center;font-size:12px;color:rgba(201,164,84,.2);letter-spacing:6px;margin-bottom:32px;}
label{display:block;font-size:11px;color:rgba(201,164,84,.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,164,84,.2);border-radius:8px;padding:12px 16px;font-size:14px;color:#FAF6EF;outline:none;font-family:'Sarabun',sans-serif;transition:all .2s;margin-bottom:16px;}
input:focus{border-color:#C9A454;background:rgba(201,164,84,.05);}
button{width:100%;background:#C9A454;color:#120C06;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;letter-spacing:.5px;transition:all .15s;margin-top:8px;}
button:hover{background:#B8932A;}
.error{background:rgba(139,46,46,.2);border:1px solid rgba(139,46,46,.4);border-radius:8px;padding:10px 14px;color:#E0A0A0;font-size:13px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">SHARKIRY</div>
  <div class="sub">ระบบจัดการภายใน</div>
  <div class="deco">✦ ✦ ✦</div>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form method="POST">
    <label>ชื่อผู้ใช้</label>
    <input type="text" name="username" placeholder="username" required autofocus>
    <label>รหัสผ่าน</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">เข้าสู่ระบบ</button>
  </form>
</div>
</body>
</html>
